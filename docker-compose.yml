version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lounge_db
    restart: always
    environment:
      POSTGRES_USER: loungebar_user
      POSTGRES_PASSWORD: loungebar_password
      POSTGRES_DB: loungebar
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  gateway:
    build:
      context: ./server
      dockerfile: services/gateway/Dockerfile
    container_name: lounge_gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - LOUNGE_SERVICE_URL=http://lounge-service:3002
      - RESERVATION_SERVICE_URL=http://reservation-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    depends_on:
      - auth-service
      - lounge-service
      - reservation-service
      - payment-service
      - notification-service

  auth-service:
    build:
      context: ./server
      dockerfile: services/auth-service/Dockerfile
    container_name: lounge_auth_service
    restart: always
    environment:
      - DATABASE_URL=postgresql://loungebar_user:loungebar_password@db:5432/loungebar
      - JWT_SECRET=supersecretjwtkey
      - JWT_EXPIRES_IN=7d
    depends_on:
      - db

  lounge-service:
    build:
      context: ./server
      dockerfile: services/lounge-service/Dockerfile
    container_name: lounge_lounge_service
    restart: always
    environment:
      - DATABASE_URL=postgresql://loungebar_user:loungebar_password@db:5432/loungebar
      - JWT_SECRET=supersecretjwtkey
      - JWT_EXPIRES_IN=7d
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    depends_on:
      - db

  reservation-service:
    build:
      context: ./server
      dockerfile: services/reservation-service/Dockerfile
    container_name: lounge_reservation_service
    restart: always
    environment:
      - DATABASE_URL=postgresql://loungebar_user:loungebar_password@db:5432/loungebar
      - JWT_SECRET=supersecretjwtkey
      - JWT_EXPIRES_IN=7d
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    depends_on:
      - db

  payment-service:
    build:
      context: ./server
      dockerfile: services/payment-service/Dockerfile
    container_name: lounge_payment_service
    restart: always
    environment:
      - DATABASE_URL=postgresql://loungebar_user:loungebar_password@db:5432/loungebar
      - JWT_SECRET=supersecretjwtkey
      - JWT_EXPIRES_IN=7d
    depends_on:
      - db

  notification-service:
    build:
      context: ./server
      dockerfile: services/notification-service/Dockerfile
    container_name: lounge_notification_service
    restart: always
    environment:
      - CLIENT_ORIGIN=http://localhost:5173

volumes:
  db_data:
